<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AMGF · Măsurare Teren</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A843;--gold-light:#F0C96A;--gold-dark:#9A7020;
  --black:#0A0A0A;--dark:#111;--panel:#141414;
  --border:#2A2A2A;--text:#FFFFFF;--muted:#888;
  --red:#FF5555;--green:#4DB88A;--blue:#5599FF;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;}
#app.fs #header,#app.fs #searchWrap,#app.fs #panel{display:none!important;}
#app.fs #mapWrap{flex:1;}

/* HEADER */
#header{background:var(--dark);border-bottom:2px solid var(--gold-dark);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:500;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-hex{width:32px;height:32px;background:var(--gold);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--black);}
.logo-name{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'Share Tech Mono',monospace;}
.gps-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--text);font-weight:600;}
.gps-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
.gps-dot.on{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 1.4s infinite;}
.gps-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SEARCH */
#searchWrap{background:var(--dark);border-bottom:1px solid var(--border);padding:7px 10px;display:flex;gap:6px;flex-shrink:0;z-index:490;}
#searchInput{flex:1;background:#1E1E1E;border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:#FFF;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;}
#searchInput::placeholder{color:var(--muted);}
#searchInput:focus{border-color:var(--gold-dark);}
#searchBtn{background:var(--gold);border:none;border-radius:6px;padding:8px 14px;color:var(--black);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;white-space:nowrap;}

/* MAP */
#mapWrap{position:relative;flex:1;min-height:0;}
#map{width:100%;height:100%;}
.leaflet-control-zoom a{background:#1a1a1a!important;color:var(--gold)!important;border-color:#333!important;font-weight:700;}

/* Search overlay on map */
#searchResults{position:absolute;top:0;left:0;right:0;background:#1A1A1A;border:1px solid var(--gold-dark);border-top:none;border-radius:0 0 10px 10px;z-index:800;max-height:240px;overflow-y:auto;display:none;box-shadow:0 8px 20px rgba(0,0,0,.8);}
.sr-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;line-height:1.4;}
.sr-item:last-child{border-bottom:none;}
.sr-item:active{background:#252525;}
.sr-name{font-size:14px;font-weight:700;color:#FFF;}
.sr-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* MAP BUTTONS */
#mapBtns{position:absolute;top:10px;right:10px;z-index:400;display:flex;flex-direction:column;gap:6px;}
.map-btn{background:rgba(15,15,15,0.93);border:1px solid var(--gold-dark);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:8px 10px;border-radius:6px;cursor:pointer;letter-spacing:1px;white-space:nowrap;text-align:center;min-width:64px;}
.map-btn:active{background:#2A2A2A;}
#btnFs{position:absolute;top:10px;left:52px;z-index:400;background:rgba(15,15,15,0.93);border:1px solid var(--gold-dark);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:8px 10px;border-radius:6px;cursor:pointer;}
#btnFsExit{position:absolute;top:10px;left:10px;z-index:400;background:rgba(212,168,67,0.92);border:none;color:var(--black);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:8px 10px;border-radius:6px;cursor:pointer;display:none;}

/* COLOR PICKER on map */
#colorPicker{position:absolute;bottom:14px;left:10px;z-index:400;display:flex;gap:6px;}
.color-dot{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;}
.color-dot.active{border-color:#FFF;transform:scale(1.2);}

/* TRACKING indicator */
#trackingBadge{position:absolute;top:52px;left:10px;z-index:400;background:rgba(77,184,138,0.9);color:#000;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;display:none;animation:blink 1.4s infinite;}

/* PANEL */
#panel{flex-shrink:0;background:var(--panel);border-top:2px solid var(--gold-dark);z-index:400;display:flex;flex-direction:column;max-height:54vh;overflow:hidden;}
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0;}
.tab-content.active{display:flex;}

/* STATS */
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);flex-shrink:0;}
.stat{background:var(--dark);padding:9px 4px;text-align:center;}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:3px;}
.stat-val{font-size:14px;font-weight:700;color:#FFF;font-family:'Share Tech Mono',monospace;line-height:1;white-space:nowrap;}
.u{font-size:8px;color:var(--gold);}

/* BUTTONS */
#btns{padding:7px 10px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;flex-shrink:0;border-bottom:1px solid var(--border);}
#btns2{padding:0 10px 7px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;flex-shrink:0;border-bottom:1px solid var(--border);}
.btn{padding:9px 4px;border-radius:6px;border:none;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-transform:uppercase;transition:all .15s;line-height:1.3;}
#btnGps{background:var(--gold);color:var(--black);}
#btnGps.active{background:#162616;color:var(--green);border:1px solid var(--green);}
#btnAdd{background:#1A1A1A;color:#FFF;border:1px solid var(--border);opacity:.35;pointer-events:none;}
#btnAdd.ready{opacity:1;pointer-events:auto;border-color:var(--green);color:var(--green);}
#btnUndo{background:#1A1A1A;color:#FFF;border:1px solid var(--border);}
#btnClear{background:#1A1A1A;color:var(--red);border:1px solid #3A1010;}
#btnTrack{background:#1A1A1A;color:var(--blue);border:1px solid #1A2A4A;}
#btnTrack.active{background:#1A2A3A;color:var(--blue);border-color:var(--blue);}
#btnSave{background:#1A1A1A;color:var(--gold);border:1px solid var(--gold-dark);}
#btnExportImg{background:#1A1A1A;color:#FFF;border:1px solid var(--border);}
#btnExportKml{background:#1A1A1A;color:var(--green);border:1px solid #1A3A2A;}

/* LIST */
#listWrap{flex:1;overflow-y:auto;padding:8px 10px;min-height:0;}
#listWrap::-webkit-scrollbar{width:3px;}
#listWrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pt-item{display:flex;align-items:center;gap:8px;background:#1A1A1A;border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-bottom:4px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pt-num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--black);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pt-info{flex:1;min-width:0;}
.pt-coords{font-size:10px;font-family:'Share Tech Mono',monospace;color:#FFF;line-height:1.4;font-weight:600;}
.pt-meta{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.pt-gps{color:var(--green);}
.pt-del{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
.pt-del:active{color:var(--red);}
.empty{text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:12px;padding:16px 10px;line-height:2;}

/* DETAILS TAB */
#detailWrap{flex:1;overflow-y:auto;padding:10px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#1A1A1A;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;}
.detail-lbl{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.detail-val{font-size:12px;font-weight:700;color:#FFF;font-family:'Share Tech Mono',monospace;text-align:right;}
.detail-section{font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;padding:8px 2px 4px;}

/* FAVORITES TAB */
#favWrap{flex:1;overflow-y:auto;padding:8px 10px;min-height:0;}
.fav-item{background:#1A1A1A;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.fav-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.fav-name{font-size:14px;font-weight:700;color:var(--gold);}
.fav-actions{display:flex;gap:5px;}
.fav-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;font-weight:700;padding:3px 8px;cursor:pointer;font-family:'Rajdhani',sans-serif;}
.fav-btn.load{color:var(--green);border-color:var(--green);}
.fav-btn.del{color:var(--red);border-color:#3A1010;}
.fav-stats{font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--muted);line-height:1.7;}
.fav-stats span{color:#FFF;}
.fav-empty{text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:12px;padding:30px 10px;line-height:2;}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;}
#modal.show{display:flex;}
.modal-box{background:#1A1A1A;border:1px solid var(--gold-dark);border-radius:12px;padding:20px;width:290px;max-width:92vw;}
.modal-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:14px;text-align:center;}
.modal-input{width:100%;background:#111;border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:#FFF;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--gold-dark);}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:10px;border-radius:6px;border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;}
.modal-btn.confirm{background:var(--gold);color:var(--black);}
.modal-btn.cancel{background:#2A2A2A;color:var(--muted);}

/* MARKERS */
.mk{width:30px;height:30px;border:3px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;font-family:'Rajdhani',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.5);}
.gm{width:16px;height:16px;background:var(--green);border:2px solid #fff;border-radius:50%;animation:ripple 1.5s infinite;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(77,184,138,.5)}70%{box-shadow:0 0 0 10px rgba(77,184,138,0)}100%{box-shadow:0 0 0 0 rgba(77,184,138,0)}}
</style>
</head>
<body>
<div id="app">

<div id="header">
  <div class="logo">
    <div class="logo-hex">A</div>
    <div><div class="logo-name">AMGF</div><div class="logo-sub">LAND MEASURE PRO</div></div>
  </div>
  <div class="gps-badge">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsLbl">GPS OFF</span>
  </div>
</div>

<div id="searchWrap">
  <input id="searchInput" type="text" placeholder="🔍 Caută localitate, adresă..." autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
  <button id="searchBtn" onclick="doSearch()">CAUTĂ</button>
</div>

<div id="mapWrap">
  <div id="map"></div>
  <div id="searchResults"></div>
  <button id="btnFs" onclick="enterFS()">⛶ FS</button>
  <button id="btnFsExit" onclick="exitFS()">✕ IEȘI</button>
  <div id="mapBtns">
    <button class="map-btn" id="btnLayer" onclick="cycleLayer()">⛰ TEREN</button>
    <button class="map-btn" id="btnMe" onclick="goToMe()">📍 EU</button>
  </div>
  <div id="colorPicker">
    <div class="color-dot active" style="background:#D4A843" onclick="setColor('#D4A843','#000')" title="Auriu"></div>
    <div class="color-dot" style="background:#FF5555" onclick="setColor('#FF5555','#FFF')" title="Roșu"></div>
    <div class="color-dot" style="background:#4DB88A" onclick="setColor('#4DB88A','#000')" title="Verde"></div>
    <div class="color-dot" style="background:#5599FF" onclick="setColor('#5599FF','#FFF')" title="Albastru"></div>
    <div class="color-dot" style="background:#FF8C00" onclick="setColor('#FF8C00','#000')" title="Portocaliu"></div>
  </div>
  <div id="trackingBadge">⏺ ÎNREGISTRARE TRASEU</div>
</div>

<div id="panel">
  <div id="tabs">
    <div class="tab active" onclick="switchTab('measure')">📐 Măsură</div>
    <div class="tab" onclick="switchTab('details')">📊 Detalii</div>
    <div class="tab" onclick="switchTab('favs')">⭐ Favorite</div>
  </div>

  <!-- MEASURE TAB -->
  <div class="tab-content active" id="tabMeasure">
    <div id="stats">
      <div class="stat"><div class="stat-lbl">Suprafață</div><div class="stat-val" id="sArea">0<span class="u"> m²</span></div></div>
      <div class="stat"><div class="stat-lbl">Hectare</div><div class="stat-val" id="sHa">0.000<span class="u"> ha</span></div></div>
      <div class="stat"><div class="stat-lbl">Ari</div><div class="stat-val" id="sAri">0.00<span class="u"> ar</span></div></div>
      <div class="stat"><div class="stat-lbl">Perimetru</div><div class="stat-val" id="sPerim">0<span class="u"> m</span></div></div>
    </div>
    <div id="btns">
      <button class="btn" id="btnGps"   onclick="toggleGPS()">📍<br>GPS</button>
      <button class="btn" id="btnAdd"   onclick="addGpsPoint()">➕<br>Adaugă</button>
      <button class="btn" id="btnTrack" onclick="toggleTracking()">⏺<br>Traseu</button>
      <button class="btn" id="btnUndo"  onclick="undoLast()">↩<br>Undo</button>
    </div>
    <div id="btns2">
      <button class="btn" id="btnSave"      onclick="openSave()">⭐<br>Salvează</button>
      <button class="btn" id="btnExportImg" onclick="exportImage()">🖼<br>Imagine</button>
      <button class="btn" id="btnExportKml" onclick="exportKML()">📤<br>KML</button>
      <button class="btn" id="btnClear"     onclick="clearAll()">🗑<br>Reset</button>
    </div>
    <div id="listWrap">
      <div class="empty" id="emptyMsg">📌 Click pe hartă sau activează GPS</div>
      <div id="ptList"></div>
    </div>
  </div>

  <!-- DETAILS TAB -->
  <div class="tab-content" id="tabDetails">
    <div id="detailWrap">
      <div class="empty" id="detailEmpty">Adaugă puncte pentru a vedea detalii</div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- FAVORITES TAB -->
  <div class="tab-content" id="tabFavs">
    <div id="favWrap">
      <div class="fav-empty" id="favEmpty">⭐ Nicio măsurătoare salvată</div>
      <div id="favList"></div>
    </div>
  </div>
</div>
</div>

<!-- SAVE MODAL -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-title">⭐ Salvează Teren</div>
    <input class="modal-input" id="saveName" placeholder="Nume teren (ex: Câmp Nord)" maxlength="40">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Anulează</button>
      <button class="modal-btn confirm" onclick="confirmSave()">Salvează</button>
    </div>
  </div>
</div>

<script>
// ── LAYERS ─────────────────────────────────────────
const layerDefs=[
  {name:'🛰 SAT', next:'⛰ TEREN', tile:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,maxNativeZoom:19})},
  {name:'⛰ TEREN',next:'🗺 MAP',  tile:L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,maxNativeZoom:17})},
  {name:'🗺 MAP',  next:'🛰 SAT', tile:L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,maxNativeZoom:19})}
];
let curLayer=0;
const map=L.map('map',{center:[45.9432,24.9668],zoom:7,zoomControl:true,attributionControl:false,layers:[layerDefs[0].tile]});
document.getElementById('btnLayer').textContent=layerDefs[0].next;

function cycleLayer(){
  map.removeLayer(layerDefs[curLayer].tile);
  curLayer=(curLayer+1)%layerDefs.length;
  map.addLayer(layerDefs[curLayer].tile);
  document.getElementById('btnLayer').textContent=layerDefs[curLayer].next;
}

// ── COLOR ──────────────────────────────────────────
let polyColor='#D4A843', markerTextColor='#000';
function setColor(c,t){
  polyColor=c; markerTextColor=t;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
  event.target.classList.add('active');
  redraw();
  // re-render markers
  mkrs.forEach((m,i)=>m.setIcon(L.divIcon({className:'',html:`<div class="mk" style="background:${polyColor};color:${markerTextColor}">${i+1}</div>`,iconSize:[30,30],iconAnchor:[15,15]})));
}

// ── FULLSCREEN ────────────────────────────────────
function enterFS(){
  document.getElementById('app').classList.add('fs');
  document.getElementById('btnFs').style.display='none';
  document.getElementById('btnFsExit').style.display='block';
  setTimeout(()=>map.invalidateSize(),150);
}
function exitFS(){
  document.getElementById('app').classList.remove('fs');
  document.getElementById('btnFs').style.display='block';
  document.getElementById('btnFsExit').style.display='none';
  setTimeout(()=>map.invalidateSize(),150);
}

// ── TABS ──────────────────────────────────────────
function switchTab(name){
  ['measure','details','favs'].forEach(n=>{
    document.querySelector(`.tab:nth-child(${['measure','details','favs'].indexOf(n)+1})`).classList.toggle('active',n===name);
    document.getElementById('tab'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===name);
  });
  if(name==='details') renderDetails();
  if(name==='favs') renderFavs();
}

// ── STATE ─────────────────────────────────────────
let pts=[],mkrs=[],poly=null,pline=null;
let gpsOn=false,gpsWatchId=null,gpsMk=null,gpsPos=null;
let tracking=false,trackInterval=null,trackPolyline=null,trackPts=[];

// ── MAP CLICK ─────────────────────────────────────
map.on('click',e=>{hideResults();addPoint(e.latlng.lat,e.latlng.lng,'click');});

// ── SEARCH ────────────────────────────────────────
let searchTimeout=null;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  const q=this.value.trim();
  if(q.length<3){hideResults();return;}
  searchTimeout=setTimeout(()=>liveSearch(q),400);
});
document.addEventListener('click',function(e){
  if(!e.target.closest('#searchWrap')&&!e.target.closest('#searchResults'))hideResults();
});
async function liveSearch(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,{headers:{'Accept-Language':'ro,en'}});
    const data=await r.json();
    showResults(data);
  }catch(e){hideResults();}
}
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  await liveSearch(q);
}
function showResults(data){
  const box=document.getElementById('searchResults');
  if(!data||!data.length){box.innerHTML='<div class="sr-item"><div class="sr-name" style="color:var(--muted)">Niciun rezultat</div></div>';box.style.display='block';return;}
  box.innerHTML=data.map(r=>`<div class="sr-item" onclick="selectResult(${r.lat},${r.lon},'${escQ(r.display_name)}')"><div class="sr-name">${fullName(r)}</div><div class="sr-sub">${shortAddr(r)}</div></div>`).join('');
  box.style.display='block';
}
function hideResults(){document.getElementById('searchResults').style.display='none';}
function escQ(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function fullName(r){return r.display_name.split(',').slice(0,2).join(',').trim();}
function shortAddr(r){const a=r.address||{};return[a.county||a.state_district,a.state,a.country].filter(Boolean).slice(0,3).join(', ');}
function selectResult(lat,lon,name){
  hideResults();
  document.getElementById('searchInput').value=name.split(',')[0].trim();
  map.setView([parseFloat(lat),parseFloat(lon)],15);
}

// ── GPS ───────────────────────────────────────────
function toggleGPS(){gpsOn?stopGPS():startGPS();}
function startGPS(){
  if(!navigator.geolocation){alert('Geolocation nu e disponibil.');return;}
  gpsOn=true;
  const b=document.getElementById('btnGps');
  b.classList.add('active');b.innerHTML='⏹<br>Stop';
  document.getElementById('gpsDot').className='gps-dot on';
  document.getElementById('gpsLbl').textContent='GPS ON';
  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>{
      gpsPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy,alt:pos.coords.altitude};
      updateGpsMk(gpsPos.lat,gpsPos.lng);
      document.getElementById('btnAdd').classList.add('ready');
      document.getElementById('gpsLbl').textContent=`±${Math.round(gpsPos.acc)}m`;
      if(tracking) addTrackPoint(gpsPos.lat,gpsPos.lng);
    },
    err=>{
      document.getElementById('gpsDot').className='gps-dot err';
      const msgs={1:'Refuzat',2:'Indisponibil',3:'Timeout'};
      document.getElementById('gpsLbl').textContent=msgs[err.code]||'ERR';
    },
    {enableHighAccuracy:true,maximumAge:2000,timeout:15000}
  );
}
function stopGPS(){
  gpsOn=false;
  if(gpsWatchId)navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMk){map.removeLayer(gpsMk);gpsMk=null;}
  if(tracking)stopTracking();
  const b=document.getElementById('btnGps');
  b.classList.remove('active');b.innerHTML='📍<br>GPS';
  document.getElementById('btnAdd').classList.remove('ready');
  document.getElementById('gpsDot').className='gps-dot';
  document.getElementById('gpsLbl').textContent='GPS OFF';
}
function updateGpsMk(lat,lng){
  const icon=L.divIcon({className:'',html:'<div class="gm"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  if(gpsMk)gpsMk.setLatLng([lat,lng]);
  else{gpsMk=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);map.setView([lat,lng],17);}
}
function goToMe(){
  if(gpsPos){map.setView([gpsPos.lat,gpsPos.lng],17);return;}
  navigator.geolocation&&navigator.geolocation.getCurrentPosition(
    p=>map.setView([p.coords.latitude,p.coords.longitude],16),
    ()=>alert('Activează GPS-ul mai întâi.')
  );
}
function addGpsPoint(){
  if(!gpsPos){alert('Așteptând semnal GPS...');return;}
  // vibrate on add
  if(navigator.vibrate) navigator.vibrate(60);
  addPoint(gpsPos.lat,gpsPos.lng,'gps');
  map.panTo([gpsPos.lat,gpsPos.lng]);
}

// ── TRACKING ──────────────────────────────────────
function toggleTracking(){
  if(!gpsOn){alert('Pornește GPS-ul mai întâi.');return;}
  tracking?stopTracking():startTracking();
}
function startTracking(){
  tracking=true;trackPts=[];
  if(trackPolyline){map.removeLayer(trackPolyline);trackPolyline=null;}
  document.getElementById('btnTrack').classList.add('active');
  document.getElementById('btnTrack').innerHTML='⏹<br>Stop';
  document.getElementById('trackingBadge').style.display='block';
}
function stopTracking(){
  tracking=false;
  document.getElementById('btnTrack').classList.remove('active');
  document.getElementById('btnTrack').innerHTML='⏺<br>Traseu';
  document.getElementById('trackingBadge').style.display='none';
  if(trackPts.length>2){
    if(confirm(`Traseu înregistrat: ${trackPts.length} puncte.\nConvertești în poligon de măsurat?`)){
      mkrs.forEach(m=>map.removeLayer(m));pts=[];mkrs=[];
      if(poly){map.removeLayer(poly);poly=null;}
      if(pline){map.removeLayer(pline);pline=null;}
      // add every Nth point to avoid too many
      const step=Math.max(1,Math.floor(trackPts.length/20));
      for(let i=0;i<trackPts.length;i+=step) addPoint(trackPts[i].lat,trackPts[i].lng,'track');
    }
  }
  if(trackPolyline){map.removeLayer(trackPolyline);trackPolyline=null;}
  trackPts=[];
}
function addTrackPoint(lat,lng){
  trackPts.push({lat,lng});
  const ll=trackPts.map(p=>[p.lat,p.lng]);
  if(trackPolyline) trackPolyline.setLatLngs(ll);
  else trackPolyline=L.polyline(ll,{color:polyColor,weight:3,opacity:.7}).addTo(map);
}

// ── ADD POINT ─────────────────────────────────────
function addPoint(lat,lng,src){
  pts.push({lat,lng,src});
  const n=pts.length;
  const mk=L.marker([lat,lng],{
    icon:L.divIcon({className:'',html:`<div class="mk" style="background:${polyColor};color:${markerTextColor}">${n}</div>`,iconSize:[30,30],iconAnchor:[15,15]})
  }).addTo(map);
  mkrs.push(mk);
  redraw();calcStats();renderList();
}

// ── DRAW ──────────────────────────────────────────
function redraw(){
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  if(pts.length<2)return;
  const ll=pts.map(p=>[p.lat,p.lng]);
  if(pts.length>=3) poly=L.polygon(ll,{color:polyColor,fillColor:polyColor,fillOpacity:.15,weight:2.5,dashArray:'8,4'}).addTo(map);
  else pline=L.polyline(ll,{color:polyColor,weight:2.5,dashArray:'8,4'}).addTo(map);
}

// ── CALC ──────────────────────────────────────────
function shoelace(p){
  if(p.length<3)return 0;
  const R=6371000;let a=0;
  for(let i=0;i<p.length;i++){
    const j=(i+1)%p.length;
    const xi=p[i].lng*Math.PI/180*R*Math.cos(p[i].lat*Math.PI/180);
    const yi=p[i].lat*Math.PI/180*R;
    const xj=p[j].lng*Math.PI/180*R*Math.cos(p[j].lat*Math.PI/180);
    const yj=p[j].lat*Math.PI/180*R;
    a+=xi*yj-xj*yi;
  }
  return Math.abs(a/2);
}
function hav(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function perimCalc(p){
  if(p.length<2)return 0;
  let s=0;
  for(let i=0;i<p.length;i++)s+=hav(p[i].lat,p[i].lng,p[(i+1)%p.length].lat,p[(i+1)%p.length].lng);
  return s;
}
function azimuth(lat1,lon1,lat2,lon2){
  const dL=(lon2-lon1)*Math.PI/180;
  const la1=lat1*Math.PI/180,la2=lat2*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dL);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
// Stereo70 conversion (Romanian system)
function wgs84toStereo70(lat,lon){
  const a=6378245.0,f=1/298.3,e2=2*f-f*f;
  const lat0=46*Math.PI/180,lon0=25*Math.PI/180;
  const k0=0.9998,FE=500000,FN=500000;
  const e=Math.sqrt(e2),latR=lat*Math.PI/180,lonR=lon*Math.PI/180;
  const N=a/Math.sqrt(1-e2*Math.sin(latR)**2);
  const t=Math.tan(Math.PI/4-latR/2)/Math.pow((1-e*Math.sin(latR))/(1+e*Math.sin(latR)),e/2);
  const t0=Math.tan(Math.PI/4-lat0/2)/Math.pow((1-e*Math.sin(lat0))/(1+e*Math.sin(lat0)),e/2);
  const N0=a/Math.sqrt(1-e2*Math.sin(lat0)**2);
  const rho=2*k0*N0*t/Math.sqrt(1+t*t),rho0=2*k0*N0*t0/Math.sqrt(1+t0*t0);
  const dL=lonR-lon0;
  const E=FE+rho*Math.sin(dL);
  const N_=FN+rho0-rho*Math.cos(dL);
  return{E:Math.round(E*100)/100,N:Math.round(N_*100)/100};
}
function fmtArea(a){
  if(a>=10000)return`${(a/10000).toFixed(3)}<span class="u"> ha</span>`;
  return`${a.toFixed(0)}<span class="u"> m²</span>`;
}
function fmtDist(v){return v>=1000?`${(v/1000).toFixed(3)}<span class="u"> km</span>`:`${v.toFixed(1)}<span class="u"> m</span>`;}
function calcStats(){
  const a=shoelace(pts),p=perimCalc(pts);
  document.getElementById('sArea').innerHTML=fmtArea(a);
  document.getElementById('sHa').innerHTML=`${(a/10000).toFixed(4)}<span class="u"> ha</span>`;
  document.getElementById('sAri').innerHTML=`${(a/100).toFixed(2)}<span class="u"> ar</span>`;
  document.getElementById('sPerim').innerHTML=fmtDist(p);
}

// ── RENDER LIST ───────────────────────────────────
function renderList(){
  document.getElementById('emptyMsg').style.display=pts.length?'none':'block';
  document.getElementById('ptList').innerHTML=pts.map((p,i)=>{
    const dist=i>0?hav(pts[i-1].lat,pts[i-1].lng,p.lat,p.lng):0;
    const az=i>0?azimuth(pts[i-1].lat,pts[i-1].lng,p.lat,p.lng):null;
    return`<div class="pt-item">
      <div class="pt-num" style="background:${polyColor};color:${markerTextColor}">${i+1}</div>
      <div class="pt-info">
        <div class="pt-coords">${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</div>
        <div class="pt-meta">
          ${p.src==='gps'?'<span class="pt-gps">● GPS</span> ':''}
          ${i>0?`↗ ${az.toFixed(1)}° &nbsp; ↔ ${dist.toFixed(1)}m`:'Punct de start'}
        </div>
      </div>
      <button class="pt-del" onclick="delPt(${i})">×</button>
    </div>`;
  }).join('');
}

// ── DETAILS TAB ───────────────────────────────────
function renderDetails(){
  const area=shoelace(pts),perim=perimCalc(pts);
  const el=document.getElementById('detailContent');
  const em=document.getElementById('detailEmpty');
  if(pts.length<2){em.style.display='block';el.innerHTML='';return;}
  em.style.display='none';
  let html='';
  html+=`<div class="detail-section">📐 Suprafață</div>`;
  html+=dRow('m²',area.toFixed(2));
  html+=dRow('Hectare (ha)',(area/10000).toFixed(4));
  html+=dRow('Ari (ar)',(area/100).toFixed(2));
  html+=dRow('mp (stânjeni²)',(area/3.5966).toFixed(2));
  html+=`<div class="detail-section">📏 Distanțe</div>`;
  html+=dRow('Perimetru',perim>=1000?(perim/1000).toFixed(3)+' km':perim.toFixed(1)+' m');
  html+=dRow('Puncte marcate',pts.length);
  html+=`<div class="detail-section">🌍 Coordonate centru</div>`;
  if(pts.length>0){
    const cLat=pts.reduce((s,p)=>s+p.lat,0)/pts.length;
    const cLon=pts.reduce((s,p)=>s+p.lon,0)/pts.length||pts.reduce((s,p)=>s+p.lng,0)/pts.length;
    const s70=wgs84toStereo70(cLat,cLon);
    html+=dRow('Lat (WGS84)',cLat.toFixed(6)+'°');
    html+=dRow('Lon (WGS84)',cLon.toFixed(6)+'°');
    html+=dRow('Stereo70 E',s70.E+' m');
    html+=dRow('Stereo70 N',s70.N+' m');
  }
  html+=`<div class="detail-section">📍 Puncte Stereo70</div>`;
  pts.forEach((p,i)=>{
    const s=wgs84toStereo70(p.lat,p.lng);
    html+=dRow(`Pt.${i+1} E / N`,`${s.E} / ${s.N}`);
  });
  el.innerHTML=html;
}
function dRow(lbl,val){
  return`<div class="detail-row"><span class="detail-lbl">${lbl}</span><span class="detail-val">${val}</span></div>`;
}

// ── ACTIONS ───────────────────────────────────────
function delPt(i){
  map.removeLayer(mkrs[i]);pts.splice(i,1);mkrs.splice(i,1);
  mkrs.forEach((m,j)=>m.setIcon(L.divIcon({className:'',html:`<div class="mk" style="background:${polyColor};color:${markerTextColor}">${j+1}</div>`,iconSize:[30,30],iconAnchor:[15,15]})));
  redraw();calcStats();renderList();
}
function undoLast(){if(pts.length)delPt(pts.length-1);}
function clearAll(){
  if(!pts.length)return;
  if(!confirm('Ștergi toate punctele?'))return;
  mkrs.forEach(m=>map.removeLayer(m));pts=[];mkrs=[];
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  calcStats();renderList();
}

// ── EXPORT IMAGE ──────────────────────────────────
function exportImage(){
  if(pts.length<2){alert('Adaugă cel puțin 2 puncte.');return;}
  const bounds=L.latLngBounds(pts.map(p=>[p.lat,p.lng]));
  const center=bounds.getCenter();
  const area=shoelace(pts);
  const areaStr=area>=10000?(area/10000).toFixed(3)+' ha':area.toFixed(0)+' m²';
  const perim=perimCalc(pts);
  const perimStr=perim>=1000?(perim/1000).toFixed(3)+' km':perim.toFixed(0)+' m';
  const zoom=map.getZoom();
  const coords=pts.map(p=>`${p.lat.toFixed(5)},${p.lng.toFixed(5)}`).join('|');
  // Build static map URL with polygon
  const polyCoords=pts.map(p=>`${p.lat},${p.lng}`).join('%7C');
  const color=polyColor.replace('#','0x')+'CC';
  // Use canvas to create image card
  const canvas=document.createElement('canvas');
  canvas.width=800;canvas.height=500;
  const ctx=canvas.getContext('2d');
  // Background
  ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,800,500);
  // Header bar
  ctx.fillStyle='#111';ctx.fillRect(0,0,800,60);
  ctx.fillStyle=polyColor;ctx.font='bold 28px Arial';ctx.fillText('AMGF · LAND MEASURE',20,40);
  ctx.fillStyle='#888';ctx.font='14px monospace';ctx.fillText(new Date().toLocaleDateString('ro-RO')+' '+new Date().toLocaleTimeString('ro-RO'),580,40);
  // Stats
  const stats=[
    ['SUPRAFAȚĂ',areaStr],['HECTARE',(area/10000).toFixed(4)+' ha'],
    ['ARI',(area/100).toFixed(2)+' ar'],['PERIMETRU',perimStr]
  ];
  stats.forEach((s,i)=>{
    const x=20+i*195;
    ctx.fillStyle='#161616';ctx.fillRect(x,75,185,70);
    ctx.strokeStyle=polyColor;ctx.lineWidth=1;ctx.strokeRect(x,75,185,70);
    ctx.fillStyle='#888';ctx.font='10px monospace';ctx.fillText(s[0],x+10,95);
    ctx.fillStyle='#FFFFFF';ctx.font='bold 16px monospace';ctx.fillText(s[1],x+10,125);
  });
  // Points table
  ctx.fillStyle=polyColor;ctx.font='bold 13px monospace';ctx.fillText('PUNCTE MARCATE (WGS84):', 20, 175);
  pts.forEach((p,i)=>{
    const row=Math.floor(i/2),col=i%2;
    const x=20+col*390,y=195+row*22;
    ctx.fillStyle='#FFFFFF';ctx.font='11px monospace';
    ctx.fillText(`Pt.${i+1}: ${p.lat.toFixed(6)}° / ${p.lng.toFixed(6)}°`,x,y);
  });
  // Stereo70
  const yS=195+Math.ceil(pts.length/2)*22+15;
  ctx.fillStyle=polyColor;ctx.font='bold 13px monospace';ctx.fillText('COORDONATE STEREO70:', 20, yS);
  pts.forEach((p,i)=>{
    const s70=wgs84toStereo70(p.lat,p.lng);
    const row=Math.floor(i/2),col=i%2;
    ctx.fillStyle='#FFFFFF';ctx.font='11px monospace';
    ctx.fillText(`Pt.${i+1}: E=${s70.E} N=${s70.N}`,20+col*390,yS+20+row*22);
  });
  // Footer
  ctx.fillStyle='#222';ctx.fillRect(0,460,800,40);
  ctx.fillStyle='#555';ctx.font='12px monospace';
  ctx.fillText('Generat cu AMGF Land Measure Pro · amgf-finance.com',20,485);
  ctx.fillStyle=polyColor;ctx.fillText('▲ AMGF',700,485);
  // Download
  const link=document.createElement('a');
  link.download=`teren-${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
}

// ── EXPORT KML ────────────────────────────────────
function exportKML(){
  if(pts.length<2){alert('Adaugă cel puțin 2 puncte.');return;}
  const name=`Teren AMGF ${new Date().toLocaleDateString('ro')}`;
  const coords=pts.map(p=>`${p.lng},${p.lat},0`).join('\n                ');
  const firstPt=`${pts[0].lng},${pts[0].lat},0`;
  const kml=`<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${name}</name>
    <Style id="polyStyle">
      <LineStyle><color>ff${polyColor.replace('#','').match(/../g).reverse().join('')}</color><width>3</width></LineStyle>
      <PolyStyle><color>4d${polyColor.replace('#','').match(/../g).reverse().join('')}</color></PolyStyle>
    </Style>
    <Placemark>
      <name>${name}</name>
      <description>Suprafata: ${(shoelace(pts)/10000).toFixed(4)} ha | Perimetru: ${perimCalc(pts).toFixed(1)} m</description>
      <styleUrl>#polyStyle</styleUrl>
      <Polygon>
        <outerBoundaryIs><LinearRing><coordinates>
                ${coords}
                ${firstPt}
        </coordinates></LinearRing></outerBoundaryIs>
      </Polygon>
    </Placemark>
${pts.map((p,i)=>`    <Placemark><name>Punct ${i+1}</name><Point><coordinates>${p.lng},${p.lat},0</coordinates></Point></Placemark>`).join('\n')}
  </Document>
</kml>`;
  const blob=new Blob([kml],{type:'application/vnd.google-earth.kml+xml'});
  const link=document.createElement('a');
  link.download=`teren-amgf-${Date.now()}.kml`;
  link.href=URL.createObjectURL(blob);
  link.click();
}

// ── FAVORITES ─────────────────────────────────────
function openSave(){
  if(pts.length<3){alert('Adaugă cel puțin 3 puncte.');return;}
  document.getElementById('saveName').value='';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('saveName').focus(),100);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function confirmSave(){
  const name=document.getElementById('saveName').value.trim()||`Teren ${new Date().toLocaleDateString('ro')}`;
  const fav={id:Date.now(),name,pts:[...pts],area:shoelace(pts),perim:perimCalc(pts),color:polyColor,date:new Date().toLocaleDateString('ro')};
  const favs=loadFavs();favs.unshift(fav);
  localStorage.setItem('amgf_favs',JSON.stringify(favs));
  closeModal();
  if(navigator.vibrate)navigator.vibrate([60,40,60]);
  alert(`✅ "${name}" salvat!`);
}
function loadFavs(){try{return JSON.parse(localStorage.getItem('amgf_favs'))||[];}catch{return[];}}
function renderFavs(){
  const favs=loadFavs();
  document.getElementById('favEmpty').style.display=favs.length?'none':'block';
  document.getElementById('favList').innerHTML=favs.map(f=>`
    <div class="fav-item">
      <div class="fav-header">
        <div class="fav-name" style="color:${f.color||'var(--gold)'}">⭐ ${f.name}</div>
        <div class="fav-actions">
          <button class="fav-btn load" onclick="loadFav(${f.id})">📍</button>
          <button class="fav-btn del" onclick="deleteFav(${f.id})">🗑</button>
        </div>
      </div>
      <div class="fav-stats">
        Suprafață: <span>${f.area>=10000?(f.area/10000).toFixed(3)+' ha':f.area.toFixed(0)+' m²'}</span>
        &nbsp;|&nbsp; Perimetru: <span>${f.perim>=1000?(f.perim/1000).toFixed(2)+' km':f.perim.toFixed(0)+' m'}</span>
        &nbsp;|&nbsp; Puncte: <span>${f.pts.length}</span><br>
        Data: <span>${f.date}</span>
      </div>
    </div>
  `).join('');
}
function loadFav(id){
  const f=loadFavs().find(x=>x.id===id);
  if(!f)return;
  mkrs.forEach(m=>map.removeLayer(m));pts=[];mkrs=[];
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  if(f.color){polyColor=f.color;}
  f.pts.forEach(p=>addPoint(p.lat,p.lng,p.src));
  if(pts.length>0) map.fitBounds(L.latLngBounds(pts.map(p=>[p.lat,p.lng])),{padding:[30,30]});
  switchTab('measure');
}
function deleteFav(id){
  if(!confirm('Ștergi această măsurătoare?'))return;
  localStorage.setItem('amgf_favs',JSON.stringify(loadFavs().filter(f=>f.id!==id)));
  renderFavs();
}
