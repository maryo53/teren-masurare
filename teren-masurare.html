<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AMGF · Măsurare Teren</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #F0C96A;
  --gold-dark: #9A7020;
  --black: #0A0A0A;
  --dark: #111;
  --panel: #141414;
  --border: #2A2A2A;
  --text: #FFFFFF;
  --muted: #999;
  --red: #FF5555;
  --green: #4DB88A;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--black); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100%; }

/* HEADER */
#header {
  background:var(--dark);
  border-bottom:2px solid var(--gold-dark);
  padding:8px 14px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; z-index:500;
}
.logo { display:flex; align-items:center; gap:9px; }
.logo-hex {
  width:32px; height:32px; background:var(--gold);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--black);
}
.logo-name { font-size:18px; font-weight:700; color:var(--gold); letter-spacing:2px; }
.logo-sub  { font-size:9px; color:var(--muted); letter-spacing:1px; font-family:'Share Tech Mono',monospace; }
.gps-badge { display:flex; align-items:center; gap:6px; font-size:11px; font-family:'Share Tech Mono',monospace; color:var(--text); font-weight:600; }
.gps-dot { width:9px; height:9px; border-radius:50%; background:var(--muted); transition:background .3s; flex-shrink:0; }
.gps-dot.on  { background:var(--green); box-shadow:0 0 7px var(--green); animation:blink 1.4s infinite; }
.gps-dot.err { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* SEARCH BAR */
#searchWrap {
  background:var(--dark);
  border-bottom:1px solid var(--border);
  padding:7px 10px;
  display:flex; gap:6px;
  flex-shrink:0; z-index:490;
}
#searchInput {
  flex:1;
  background:#1E1E1E;
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px 12px;
  color:#FFFFFF;
  font-family:'Rajdhani',sans-serif;
  font-size:14px;
  font-weight:600;
  outline:none;
}
#searchInput::placeholder { color:var(--muted); }
#searchInput:focus { border-color:var(--gold-dark); }
#searchBtn {
  background:var(--gold);
  border:none;
  border-radius:6px;
  padding:8px 14px;
  color:var(--black);
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:1px;
  white-space:nowrap;
}
#searchBtn:active { background:var(--gold-light); }
#searchResults {
  position:absolute;
  top:0; left:0; right:0;
  background:#1A1A1A;
  border:1px solid var(--border);
  border-radius:0 0 8px 8px;
  z-index:600;
  max-height:220px;
  overflow-y:auto;
  display:none;
}
.sr-item {
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:#FFFFFF;
  line-height:1.3;
}
.sr-item:last-child { border-bottom:none; }
.sr-item:active { background:#2A2A2A; }
.sr-sub { font-size:11px; color:var(--muted); font-weight:400; }

/* MAP CONTAINER */
#mapWrap { position:relative; flex:1; min-height:0; }
#map { width:100%; height:100%; }
.leaflet-control-zoom a { background:#1a1a1a!important; color:var(--gold)!important; border-color:#333!important; font-weight:700; }

/* MAP BUTTONS */
#mapBtns {
  position:absolute; top:10px; right:10px; z-index:400;
  display:flex; flex-direction:column; gap:6px;
}
.map-btn {
  background:rgba(20,20,20,0.92);
  border:1px solid var(--gold-dark);
  color:var(--gold);
  font-family:'Rajdhani',sans-serif;
  font-size:11px;
  font-weight:700;
  padding:7px 11px;
  border-radius:6px;
  cursor:pointer;
  letter-spacing:1px;
  white-space:nowrap;
}
.map-btn:active { background:#2A2A2A; }

/* PANEL */
#panel {
  flex-shrink:0;
  background:var(--panel);
  border-top:2px solid var(--gold-dark);
  z-index:400;
  max-height:52vh;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* STATS */
#stats {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stat { background:var(--dark); padding:9px 4px; text-align:center; }
.stat-lbl { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; font-family:'Share Tech Mono',monospace; margin-bottom:3px; }
.stat-val { font-size:15px; font-weight:700; color:#FFFFFF; font-family:'Share Tech Mono',monospace; line-height:1; white-space:nowrap; }
.u { font-size:9px; color:var(--gold); }

/* BUTTONS */
#btns {
  padding:8px 10px;
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:6px; flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.btn {
  padding:10px 4px; border-radius:6px; border:none;
  font-family:'Rajdhani',sans-serif; font-size:12px;
  font-weight:700; cursor:pointer; text-align:center;
  text-transform:uppercase; transition:all .15s; line-height:1.3;
}
#btnGps   { background:var(--gold); color:var(--black); }
#btnGps.active { background:#162616; color:var(--green); border:1px solid var(--green); }
#btnAdd   { background:#1A1A1A; color:#FFFFFF; border:1px solid var(--border); opacity:.35; pointer-events:none; }
#btnAdd.ready { opacity:1; pointer-events:auto; border-color:var(--green); color:var(--green); }
#btnUndo  { background:#1A1A1A; color:#FFFFFF; border:1px solid var(--border); }
#btnClear { background:#1A1A1A; color:var(--red); border:1px solid #3A1010; }

/* LIST */
#listWrap { flex:1; overflow-y:auto; padding:8px 10px; }
#listWrap::-webkit-scrollbar { width:3px; }
#listWrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.pt-item {
  display:flex; align-items:center; gap:8px;
  background:#1A1A1A; border:1px solid var(--border);
  border-radius:6px; padding:8px 10px; margin-bottom:5px;
  animation:fi .2s ease;
}
@keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.pt-num { width:22px; height:22px; border-radius:50%; background:var(--gold); color:var(--black); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pt-coords { flex:1; font-size:11px; font-family:'Share Tech Mono',monospace; color:#FFFFFF; line-height:1.5; font-weight:600; }
.pt-gps { font-size:9px; color:var(--green); }
.pt-del { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:0 5px; line-height:1; }
.pt-del:active { color:var(--red); }
.empty { text-align:center; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:12px; padding:20px 10px; line-height:2; }

/* MARKERS */
.mk { width:26px; height:26px; background:var(--gold); border:2px solid #000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#000; font-family:'Rajdhani',sans-serif; box-shadow:0 2px 8px rgba(212,168,67,.6); }
.gm { width:16px; height:16px; background:var(--green); border:2px solid #fff; border-radius:50%; box-shadow:0 0 0 rgba(77,184,138,.6); animation:ripple 1.5s infinite; }
@keyframes ripple { 0%{box-shadow:0 0 0 0 rgba(77,184,138,.5)} 70%{box-shadow:0 0 0 10px rgba(77,184,138,0)} 100%{box-shadow:0 0 0 0 rgba(77,184,138,0)} }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo">
      <div class="logo-hex">A</div>
      <div>
        <div class="logo-name">AMGF</div>
        <div class="logo-sub">LAND MEASURE</div>
      </div>
    </div>
    <div class="gps-badge">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsLbl">GPS OFF</span>
    </div>
  </div>

  <!-- SEARCH -->
  <div id="searchWrap" style="position:relative;">
    <input id="searchInput" type="text" placeholder="🔍 Caută localitate, adresă, țară..." autocomplete="off"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button id="searchBtn" onclick="doSearch()">CAUTĂ</button>
    <div id="searchResults"></div>
  </div>

  <!-- MAP -->
  <div id="mapWrap">
    <div id="map"></div>
    <div id="mapBtns">
      <button class="map-btn" id="btnLayer" onclick="toggleLayer()">🛰 SAT</button>
      <button class="map-btn" id="btnMe" onclick="goToMe()">📍 EU</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div id="stats">
      <div class="stat"><div class="stat-lbl">Suprafață</div><div class="stat-val" id="sArea">0<span class="u"> m²</span></div></div>
      <div class="stat"><div class="stat-lbl">Hectare</div><div class="stat-val" id="sHa">0.000<span class="u"> ha</span></div></div>
      <div class="stat"><div class="stat-lbl">Ari</div><div class="stat-val" id="sAri">0.00<span class="u"> ar</span></div></div>
      <div class="stat"><div class="stat-lbl">Perimetru</div><div class="stat-val" id="sPerim">0<span class="u"> m</span></div></div>
    </div>
    <div id="btns">
      <button class="btn" id="btnGps"   onclick="toggleGPS()">📍<br>GPS</button>
      <button class="btn" id="btnAdd"   onclick="addGpsPoint()">➕<br>Adaugă</button>
      <button class="btn" id="btnUndo"  onclick="undoLast()">↩<br>Undo</button>
      <button class="btn" id="btnClear" onclick="clearAll()">🗑<br>Reset</button>
    </div>
    <div id="listWrap">
      <div class="empty" id="emptyMsg">📌 Click pe hartă pentru puncte<br>sau activează GPS-ul pe teren</div>
      <div id="ptList"></div>
    </div>
  </div>
</div>

<script>
// ── LAYERS ────────────────────────────────────────────
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
const satLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:19});

const map = L.map('map',{center:[45.9432,24.9668],zoom:7,zoomControl:true,attributionControl:false,layers:[osmLayer]});

let usingSat = false;
function toggleLayer(){
  if(usingSat){
    map.removeLayer(satLayer);
    map.removeLayer(satLabels);
    map.addLayer(osmLayer);
    document.getElementById('btnLayer').textContent='🛰 SAT';
  } else {
    map.removeLayer(osmLayer);
    map.addLayer(satLayer);
    map.addLayer(satLabels);
    document.getElementById('btnLayer').textContent='🗺 MAP';
  }
  usingSat = !usingSat;
}

// ── STATE ─────────────────────────────────────────────
let pts=[],mkrs=[],poly=null,pline=null;
let gpsOn=false,gpsWatchId=null,gpsMk=null,gpsPos=null;

// ── MAP CLICK ─────────────────────────────────────────
map.on('click', e => addPoint(e.latlng.lat, e.latlng.lng, 'click'));

// ── SEARCH ────────────────────────────────────────────
let searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', function(){
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if(q.length < 3){ hideResults(); return; }
  searchTimeout = setTimeout(()=> liveSearch(q), 400);
});

document.addEventListener('click', function(e){
  if(!e.target.closest('#searchWrap')) hideResults();
});

async function liveSearch(q){
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,{
      headers:{'Accept-Language':'ro,en'}
    });
    const data = await r.json();
    showResults(data);
  } catch(e){ hideResults(); }
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  await liveSearch(q);
}

function showResults(data){
  const box = document.getElementById('searchResults');
  if(!data || !data.length){ box.innerHTML='<div class="sr-item" style="color:var(--muted)">Niciun rezultat</div>'; box.style.display='block'; return; }
  box.innerHTML = data.map((r,i)=>`
    <div class="sr-item" onclick="selectResult(${r.lat},${r.lon},'${escQ(r.display_name)}')">
      <div>${shortName(r)}</div>
      <div class="sr-sub">${shortAddr(r)}</div>
    </div>
  `).join('');
  box.style.display='block';
}

function hideResults(){
  document.getElementById('searchResults').style.display='none';
}

function escQ(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function shortName(r){ return r.name || r.display_name.split(',')[0]; }
function shortAddr(r){
  const a = r.address || {};
  const parts = [a.county||a.state_district, a.state, a.country].filter(Boolean);
  return parts.slice(0,3).join(', ');
}

function selectResult(lat,lon,name){
  hideResults();
  document.getElementById('searchInput').value = name.split(',')[0];
  map.setView([lat,lon], 14);
}

// ── GPS ───────────────────────────────────────────────
function toggleGPS(){ gpsOn ? stopGPS() : startGPS(); }

function startGPS(){
  if(!navigator.geolocation){ alert('Geolocation nu e disponibil.'); return; }
  gpsOn = true;
  const b = document.getElementById('btnGps');
  b.classList.add('active'); b.innerHTML='⏹<br>Stop';
  document.getElementById('gpsDot').className='gps-dot on';
  document.getElementById('gpsLbl').textContent='GPS ON';

  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      gpsPos = {lat:pos.coords.latitude, lng:pos.coords.longitude, acc:pos.coords.accuracy};
      updateGpsMk(gpsPos.lat, gpsPos.lng);
      document.getElementById('btnAdd').classList.add('ready');
      document.getElementById('gpsLbl').textContent = `±${Math.round(gpsPos.acc)}m`;
    },
    err => {
      document.getElementById('gpsDot').className='gps-dot err';
      const msgs={1:'Refuzat',2:'Indisponibil',3:'Timeout'};
      document.getElementById('gpsLbl').textContent = msgs[err.code]||'ERR';
    },
    {enableHighAccuracy:true, maximumAge:3000, timeout:15000}
  );
}

function stopGPS(){
  gpsOn=false;
  if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMk){ map.removeLayer(gpsMk); gpsMk=null; }
  const b=document.getElementById('btnGps');
  b.classList.remove('active'); b.innerHTML='📍<br>GPS';
  document.getElementById('btnAdd').classList.remove('ready');
  document.getElementById('gpsDot').className='gps-dot';
  document.getElementById('gpsLbl').textContent='GPS OFF';
}

function updateGpsMk(lat,lng){
  const icon=L.divIcon({className:'',html:'<div class="gm"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  if(gpsMk) gpsMk.setLatLng([lat,lng]);
  else { gpsMk=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map); map.setView([lat,lng],17); }
}

function goToMe(){
  if(gpsPos){ map.setView([gpsPos.lat,gpsPos.lng],17); return; }
  navigator.geolocation && navigator.geolocation.getCurrentPosition(
    p => map.setView([p.coords.latitude,p.coords.longitude],16),
    ()=> alert('Activează GPS-ul mai întâi.')
  );
}

function addGpsPoint(){
  if(!gpsPos){ alert('Așteptând semnal GPS...'); return; }
  addPoint(gpsPos.lat, gpsPos.lng, 'gps');
  map.panTo([gpsPos.lat, gpsPos.lng]);
}

// ── ADD POINT ─────────────────────────────────────────
function addPoint(lat,lng,src){
  pts.push({lat,lng,src});
  const n=pts.length;
  const mk=L.marker([lat,lng],{
    icon:L.divIcon({className:'',html:`<div class="mk">${n}</div>`,iconSize:[26,26],iconAnchor:[13,13]})
  }).addTo(map);
  mkrs.push(mk);
  redraw(); calcStats(); renderList();
}

// ── DRAW ──────────────────────────────────────────────
function redraw(){
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  if(pts.length<2) return;
  const ll=pts.map(p=>[p.lat,p.lng]);
  if(pts.length>=3){
    poly=L.polygon(ll,{color:'#D4A843',fillColor:'#D4A843',fillOpacity:.15,weight:2.5,dashArray:'8,4'}).addTo(map);
  } else {
    pline=L.polyline(ll,{color:'#D4A843',weight:2.5,dashArray:'8,4'}).addTo(map);
  }
}

// ── CALC ──────────────────────────────────────────────
function shoelace(p){
  if(p.length<3) return 0;
  const R=6371000; let a=0;
  for(let i=0;i<p.length;i++){
    const j=(i+1)%p.length;
    const xi=p[i].lng*Math.PI/180*R*Math.cos(p[i].lat*Math.PI/180);
    const yi=p[i].lat*Math.PI/180*R;
    const xj=p[j].lng*Math.PI/180*R*Math.cos(p[j].lat*Math.PI/180);
    const yj=p[j].lat*Math.PI/180*R;
    a+=xi*yj-xj*yi;
  }
  return Math.abs(a/2);
}
function hav(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function perimCalc(p){
  if(p.length<2) return 0;
  let s=0;
  for(let i=0;i<p.length;i++) s+=hav(p[i].lat,p[i].lng,p[(i+1)%p.length].lat,p[(i+1)%p.length].lng);
  return s;
}
function fmtArea(a){
  if(a>=10000) return `${(a/10000).toFixed(3)}<span class="u"> ha</span>`;
  return `${a.toFixed(0)}<span class="u"> m²</span>`;
}
function fmtDist(v){ return v>=1000?`${(v/1000).toFixed(2)}<span class="u"> km</span>`:`${v.toFixed(0)}<span class="u"> m</span>`; }

function calcStats(){
  const a=shoelace(pts),p=perimCalc(pts);
  document.getElementById('sArea').innerHTML  = fmtArea(a);
  document.getElementById('sHa').innerHTML    = `${(a/10000).toFixed(4)}<span class="u"> ha</span>`;
  document.getElementById('sAri').innerHTML   = `${(a/100).toFixed(2)}<span class="u"> ar</span>`;
  document.getElementById('sPerim').innerHTML = fmtDist(p);
}

// ── LIST ──────────────────────────────────────────────
function renderList(){
  document.getElementById('emptyMsg').style.display=pts.length?'none':'block';
  document.getElementById('ptList').innerHTML=pts.map((p,i)=>`
    <div class="pt-item">
      <div class="pt-num">${i+1}</div>
      <div class="pt-coords">
        ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}
        ${p.src==='gps'?'<br><span class="pt-gps">● GPS live</span>':''}
      </div>
      <button class="pt-del" onclick="delPt(${i})">×</button>
    </div>
  `).join('');
}

// ── ACTIONS ───────────────────────────────────────────
function delPt(i){
  map.removeLayer(mkrs[i]);
  pts.splice(i,1); mkrs.splice(i,1);
  mkrs.forEach((m,j)=>m.setIcon(L.divIcon({className:'',html:`<div class="mk">${j+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})));
  redraw(); calcStats(); renderList();
}
function undoLast(){ if(pts.length) delPt(pts.length-1); }
function clearAll(){
  if(!pts.length) return;
  if(!confirm('Ștergi toate punctele marcate?')) return;
  mkrs.forEach(m=>map.removeLayer(m));
  pts=[]; mkrs=[];
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  calcStats(); renderList();
}
</script>
</body>
</html>
