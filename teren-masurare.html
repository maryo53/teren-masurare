<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AMGF · Măsurare Teren</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#D4A843; --gold-light:#F0C96A; --gold-dark:#9A7020;
  --black:#0A0A0A; --dark:#111; --panel:#141414;
  --border:#252525; --text:#E8E8E8; --muted:#555;
  --red:#D94F4F; --green:#4DB88A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;}

/* HEADER */
#header{background:var(--dark);border-bottom:1px solid var(--gold-dark);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:500;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-hex{width:30px;height:30px;background:var(--gold);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--black);}
.logo-name{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'Share Tech Mono',monospace;}
.gps-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--muted);}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
.gps-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.4s infinite;}
.gps-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAP */
#map{flex:1;min-height:0;z-index:1;}
.leaflet-control-zoom a{background:#1a1a1a!important;color:var(--gold)!important;border-color:#333!important;font-weight:700;}
.leaflet-control-zoom a:hover{background:#222!important;}

/* LAYER TOGGLE */
#layerBtn{position:absolute;top:10px;right:10px;z-index:400;background:var(--dark);border:1px solid var(--gold-dark);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:6px 10px;border-radius:5px;cursor:pointer;letter-spacing:1px;}

/* PANEL */
#panel{flex-shrink:0;background:var(--panel);border-top:2px solid var(--gold-dark);z-index:400;max-height:50vh;display:flex;flex-direction:column;overflow:hidden;}

/* STATS */
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat{background:var(--dark);padding:8px 4px;text-align:center;}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:3px;}
.stat-val{font-size:14px;font-weight:700;color:var(--gold);font-family:'Share Tech Mono',monospace;line-height:1;white-space:nowrap;}
.u{font-size:8px;color:var(--gold-dark);}

/* BUTTONS */
#btns{padding:8px 10px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex-shrink:0;border-bottom:1px solid var(--border);}
.btn{padding:9px 4px;border-radius:6px;border:none;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-transform:uppercase;transition:all .15s;line-height:1.3;}
#btnGps{background:var(--gold);color:var(--black);}
#btnGps.active{background:#162616;color:var(--green);border:1px solid var(--green);}
#btnAdd{background:var(--dark);color:var(--text);border:1px solid var(--border);opacity:.35;pointer-events:none;}
#btnAdd.ready{opacity:1;pointer-events:auto;border-color:var(--green);color:var(--green);}
#btnUndo{background:var(--dark);color:var(--text);border:1px solid var(--border);}
#btnClear{background:var(--dark);color:var(--red);border:1px solid #2a1010;}

/* LIST */
#listWrap{flex:1;overflow-y:auto;padding:8px 10px;}
#listWrap::-webkit-scrollbar{width:3px;}
#listWrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pt-item{display:flex;align-items:center;gap:7px;background:var(--dark);border:1px solid var(--border);border-radius:5px;padding:6px 9px;margin-bottom:4px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pt-num{width:20px;height:20px;border-radius:50%;background:var(--gold);color:var(--black);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pt-coords{flex:1;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--muted);line-height:1.5;}
.pt-gps{font-size:8px;color:var(--green);}
.pt-del{background:none;border:none;color:#444;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.pt-del:active{color:var(--red);}
.empty{text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;padding:20px 10px;line-height:2;}

/* GPS position marker */
.gps-pulse{width:16px;height:16px;border-radius:50%;background:var(--green);border:2px solid white;box-shadow:0 0 0 rgba(77,184,138,.6);animation:ripple 1.5s infinite;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(77,184,138,.6)}70%{box-shadow:0 0 0 10px rgba(77,184,138,0)}100%{box-shadow:0 0 0 0 rgba(77,184,138,0)}}
.mk{width:26px;height:26px;background:var(--gold);border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;font-family:'Rajdhani',sans-serif;box-shadow:0 2px 8px rgba(212,168,67,.5);}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="logo">
      <div class="logo-hex">A</div>
      <div>
        <div class="logo-name">AMGF</div>
        <div class="logo-sub">LAND MEASURE</div>
      </div>
    </div>
    <div class="gps-badge">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsLbl">GPS OFF</span>
    </div>
  </div>

  <div style="position:relative;flex:1;min-height:0;display:flex;flex-direction:column;">
    <div id="map" style="flex:1;min-height:0;"></div>
    <button id="layerBtn" onclick="toggleLayer()">🛰 SAT</button>
  </div>

  <div id="panel">
    <div id="stats">
      <div class="stat"><div class="stat-lbl">Suprafață</div><div class="stat-val" id="sArea">0<span class="u"> m²</span></div></div>
      <div class="stat"><div class="stat-lbl">Hectare</div><div class="stat-val" id="sHa">0.000<span class="u"> ha</span></div></div>
      <div class="stat"><div class="stat-lbl">Ari</div><div class="stat-val" id="sAri">0.00<span class="u"> ar</span></div></div>
      <div class="stat"><div class="stat-lbl">Perimetru</div><div class="stat-val" id="sPerim">0<span class="u"> m</span></div></div>
    </div>
    <div id="btns">
      <button class="btn" id="btnGps"   onclick="toggleGPS()">📍<br>GPS</button>
      <button class="btn" id="btnAdd"   onclick="addGpsPoint()">➕<br>Adaugă</button>
      <button class="btn" id="btnUndo"  onclick="undoLast()">↩<br>Undo</button>
      <button class="btn" id="btnClear" onclick="clearAll()">🗑<br>Reset</button>
    </div>
    <div id="listWrap">
      <div class="empty" id="emptyMsg">📌 Click pe hartă pentru puncte<br>sau activează GPS-ul pe teren</div>
      <div id="ptList"></div>
    </div>
  </div>
</div>

<script>
// ── MAP ──────────────────────────────────────────────
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'OSM'});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Esri'});

const map = L.map('map',{
  center:[45.9432,24.9668],
  zoom:7,
  zoomControl:true,
  attributionControl:false,
  layers:[osmLayer]
});

let usingSat = false;
function toggleLayer(){
  if(usingSat){ map.removeLayer(satLayer); map.addLayer(osmLayer); document.getElementById('layerBtn').textContent='🛰 SAT'; }
  else { map.removeLayer(osmLayer); map.addLayer(satLayer); document.getElementById('layerBtn').textContent='🗺 MAP'; }
  usingSat = !usingSat;
}

// ── STATE ─────────────────────────────────────────────
let pts=[],mkrs=[],poly=null,pline=null;
let gpsOn=false,gpsWatchId=null,gpsMk=null,gpsPos=null;

// ── MAP CLICK ─────────────────────────────────────────
map.on('click', e => addPoint(e.latlng.lat, e.latlng.lng, 'click'));

// ── ADD POINT ─────────────────────────────────────────
function addPoint(lat,lng,src){
  pts.push({lat,lng,src});
  const n = pts.length;
  const mk = L.marker([lat,lng],{
    icon: L.divIcon({className:'',html:`<div class="mk">${n}</div>`,iconSize:[26,26],iconAnchor:[13,13]})
  }).addTo(map);
  mkrs.push(mk);
  redraw(); calcStats(); renderList();
}

// ── GPS ───────────────────────────────────────────────
function toggleGPS(){ gpsOn ? stopGPS() : startGPS(); }

function startGPS(){
  if(!navigator.geolocation){ alert('Geolocation nu e disponibil în acest browser.'); return; }
  gpsOn = true;
  const b = document.getElementById('btnGps');
  b.classList.add('active'); b.innerHTML='⏹<br>Stop';
  document.getElementById('gpsDot').className='gps-dot on';
  document.getElementById('gpsLbl').textContent='GPS ON';
  document.getElementById('gpsLbl').style.color='var(--green)';

  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      gpsPos = {lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy};
      updateGpsMk(gpsPos.lat, gpsPos.lng);
      document.getElementById('btnAdd').classList.add('ready');
      document.getElementById('gpsLbl').textContent = `±${Math.round(gpsPos.acc)}m`;
    },
    err => {
      document.getElementById('gpsDot').className = 'gps-dot err';
      const msgs = {1:'Acces refuzat',2:'Indisponibil',3:'Timeout'};
      document.getElementById('gpsLbl').textContent = msgs[err.code]||'ERR';
      document.getElementById('gpsLbl').style.color = 'var(--red)';
    },
    {enableHighAccuracy:true, maximumAge:3000, timeout:15000}
  );
}

function stopGPS(){
  gpsOn = false;
  if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMk){ map.removeLayer(gpsMk); gpsMk=null; }
  const b = document.getElementById('btnGps');
  b.classList.remove('active'); b.innerHTML='📍<br>GPS';
  document.getElementById('btnAdd').classList.remove('ready');
  document.getElementById('gpsDot').className='gps-dot';
  document.getElementById('gpsLbl').textContent='GPS OFF';
  document.getElementById('gpsLbl').style.color='';
}

function updateGpsMk(lat,lng){
  const icon = L.divIcon({className:'',html:'<div class="gps-pulse"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  if(gpsMk) gpsMk.setLatLng([lat,lng]);
  else { gpsMk = L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map); map.setView([lat,lng],16); }
}

function addGpsPoint(){
  if(!gpsPos){ alert('Așteptând semnal GPS...'); return; }
  addPoint(gpsPos.lat, gpsPos.lng, 'gps');
  // pan map to current gps
  map.panTo([gpsPos.lat, gpsPos.lng]);
}

// ── DRAW ──────────────────────────────────────────────
function redraw(){
  if(poly){ map.removeLayer(poly); poly=null; }
  if(pline){ map.removeLayer(pline); pline=null; }
  if(pts.length < 2) return;
  const ll = pts.map(p=>[p.lat,p.lng]);
  if(pts.length >= 3){
    poly = L.polygon(ll,{color:'#D4A843',fillColor:'#D4A843',fillOpacity:.15,weight:2.5,dashArray:'8,4'}).addTo(map);
  } else {
    pline = L.polyline(ll,{color:'#D4A843',weight:2.5,dashArray:'8,4'}).addTo(map);
  }
}

// ── CALCULATIONS ──────────────────────────────────────
function shoelace(p){
  if(p.length<3) return 0;
  const R=6371000; let a=0;
  for(let i=0;i<p.length;i++){
    const j=(i+1)%p.length;
    const xi=p[i].lng*Math.PI/180*R*Math.cos(p[i].lat*Math.PI/180);
    const yi=p[i].lat*Math.PI/180*R;
    const xj=p[j].lng*Math.PI/180*R*Math.cos(p[j].lat*Math.PI/180);
    const yj=p[j].lat*Math.PI/180*R;
    a += xi*yj - xj*yi;
  }
  return Math.abs(a/2);
}

function hav(a,b,c,d){
  const R=6371000, dL=(c-a)*Math.PI/180, dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function perimCalc(p){
  if(p.length<2) return 0;
  let s=0;
  for(let i=0;i<p.length;i++) s+=hav(p[i].lat,p[i].lng,p[(i+1)%p.length].lat,p[(i+1)%p.length].lng);
  return s;
}

function fmtArea(a){
  if(a>=10000) return `${(a/10000).toFixed(3)}<span class="u"> ha</span>`;
  return `${a.toFixed(0)}<span class="u"> m²</span>`;
}
function fmtDist(v){ return v>=1000?`${(v/1000).toFixed(2)}<span class="u"> km</span>`:`${v.toFixed(0)}<span class="u"> m</span>`; }

function calcStats(){
  const a=shoelace(pts), p=perimCalc(pts);
  document.getElementById('sArea').innerHTML  = fmtArea(a);
  document.getElementById('sHa').innerHTML    = `${(a/10000).toFixed(4)}<span class="u"> ha</span>`;
  document.getElementById('sAri').innerHTML   = `${(a/100).toFixed(2)}<span class="u"> ar</span>`;
  document.getElementById('sPerim').innerHTML = fmtDist(p);
}

// ── LIST ──────────────────────────────────────────────
function renderList(){
  document.getElementById('emptyMsg').style.display = pts.length ? 'none' : 'block';
  document.getElementById('ptList').innerHTML = pts.map((p,i)=>`
    <div class="pt-item">
      <div class="pt-num">${i+1}</div>
      <div class="pt-coords">
        ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}
        ${p.src==='gps'?'<br><span class="pt-gps">● GPS live</span>':''}
      </div>
      <button class="pt-del" onclick="delPt(${i})">×</button>
    </div>
  `).join('');
}

// ── ACTIONS ───────────────────────────────────────────
function delPt(i){
  map.removeLayer(mkrs[i]);
  pts.splice(i,1); mkrs.splice(i,1);
  mkrs.forEach((m,j)=>m.setIcon(L.divIcon({className:'',html:`<div class="mk">${j+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})));
  redraw(); calcStats(); renderList();
}
function undoLast(){ if(pts.length) delPt(pts.length-1); }
function clearAll(){
  if(!pts.length) return;
  if(!confirm('Ștergi toate punctele marcate?')) return;
  mkrs.forEach(m=>map.removeLayer(m));
  pts=[]; mkrs=[];
  if(poly){map.removeLayer(poly);poly=null;}
  if(pline){map.removeLayer(pline);pline=null;}
  calcStats(); renderList();
}
</script>
</body>
</html>
